name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: mkdocs build --strict

      - name: Package site
        run: tar -czf site.tar.gz -C site .

      - name: Update latest release
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release create latest site.tar.gz \
            --title "Latest Build" \
            --notes "Built from commit ${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger deployment webhook
        run: |
          curl -fsS -X POST \
            -H "X-Webhook-Token: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"sha\":\"${{ github.sha }}\",\"download_url\":\"https://github.com/${{ github.repository }}/releases/download/latest/site.tar.gz\"}" \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}"
